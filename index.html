<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!--
      Browser-language auto-redirect (Fix #2 remediation, Problem #5).

      MUST run as the FIRST <head> child so the redirect happens before
      anything else loads — no flash of Arabic content for an English
      visitor, and Lighthouse measures the final /en/ URL cleanly
      instead of a mid-page locale swap.

      The 4 rules from Ali's brief, in early-return order:

        Rule 2 — Only fire on the bare-path homepage. Deep pages
                 (/courses/[id] from a Google Ad, /en/about from a
                 share link) must NEVER redirect based on browser
                 language; they go to exactly the URL clicked.
        Rule 3 — NEVER redirect bots. Googlebot needs to crawl both
                 /  and /en/ as separate pages — auto-redirecting
                 would collapse them into one.
        Rule 1 — Skip if the user already chose a language. The
                 saved value (i18nextLng in localStorage) wins over
                 browser language. Returning users keep their choice.
        Then    — If the browser primary language starts with "en",
                 redirect to /en/. Anything else stays at root
                 (Arabic, the brand default).

      Rule 4 — Use 302-equivalent. We can't issue a real 302 from a
      static-hosted SPA, but window.location.replace() is the closest
      client-side equivalent: it doesn't push a history entry, so
      browser-back doesn't loop, and Google treats it as a redirect
      signal (not a permanent move).
    -->
    <script>
      (function () {
        try {
          // Rule 2: only fire on the homepage.
          if (window.location.pathname !== '/') return;

          // Rule 3: never redirect search-engine crawlers.
          var ua = (navigator && navigator.userAgent) || '';
          if (/googlebot|bingbot|yandexbot|baiduspider|duckduckbot|applebot|facebookexternalhit|twitterbot|linkedinbot|slackbot|whatsapp|telegrambot|embedly|w3c_validator/i.test(ua)) return;

          // Rule 1: a saved language choice always wins.
          try {
            var saved = localStorage.getItem('i18nextLng');
            if (saved === 'ar' || saved === 'en') return;
          } catch (e) {
            // localStorage blocked (iOS private mode) — fall through; we'll
            // detect language on every visit, but each one is fast.
          }

          // Browser primary language. navigator.languages is the ordered
          // preference list; navigator.language is the legacy fallback.
          var langs = (navigator.languages && navigator.languages.length)
            ? navigator.languages
            : [navigator.language || 'ar'];
          var primary = String(langs[0] || '').toLowerCase();

          // English speakers land on the English homepage. Everyone else
          // (including unknown languages) defaults to Arabic, which is the
          // brand's primary audience.
          if (primary.indexOf('en') === 0) {
            window.location.replace('/en/' + window.location.search + window.location.hash);
          }
        } catch (e) { /* defensive */ }
      })();
    </script>

    <title>Bikerz</title>
    <meta name="description" content="Master motorcycle riding with Bikerz Academy. Expert-led online courses designed for all levels. Gain skills, stay safe, and Let's Ride With Confidence. Enroll now!" />
    <meta name="keywords" content="motorcycle riding course, learn to ride motorcycle, motorcycle academy, biker training, riding lessons, motorcycle safety" />
    <meta name="author" content="BIKERZ Academy" />
    <meta name="robots" content="index, follow" />
    <!--
      No static <link rel="canonical"> here on purpose. SEOHead uses
      react-helmet-async to inject a per-page self-referencing canonical
      with data-rh="true". Having a static canonical alongside Helmet's
      version produced TWO canonical tags (Helmet appends rather than
      replaces non-data-rh tags), and Google treats duplicate canonicals
      as conflicting signals.
    -->

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bikerz" />
    <meta property="og:description" content="Master motorcycle riding with Bikerz Academy. Expert-led online courses designed for all levels. Gain skills, stay safe, and Let's Ride With Confidence. Enroll now!" />
    <meta property="og:image" content="https://academy.bikerz.com/favicon.png?v=2" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:url" content="https://academy.bikerz.com/" />
    <meta property="og:site_name" content="BIKERZ Academy" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter/X Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bikerz" />
    <meta name="twitter:description" content="Master motorcycle riding with Bikerz Academy. Expert-led online courses designed for all levels. Gain skills, stay safe, and Let's Ride With Confidence. Enroll now!" />
    <meta name="twitter:image" content="https://academy.bikerz.com/favicon.png?v=2" />
    <meta name="twitter:site" content="@BIKERZ" />

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="google7ed1a9a1c8af8981" />

    <!--
      Per-page lang/dir + og:url update for the initial HTML.

      The static defaults above (lang="ar", og:url="/") cover the bare-
      path Arabic homepage. For any other URL — /en/* and every deep
      page — we patch the DOM synchronously here so:
        • Screen readers / browser translation prompts see the right
          lang on first paint.
        • Social previews (which read og:url before JS hydrates) get
          the correct page URL instead of always-root.

      Canonical is intentionally NOT touched here — see the comment
      above where the static canonical was removed. Helmet owns the
      canonical exclusively to avoid duplicate tags.
    -->
    <script>
      (function () {
        try {
          var p = window.location.pathname || '/';
          var isEn = p === '/en' || p.indexOf('/en/') === 0;
          if (isEn) {
            document.documentElement.lang = 'en';
            document.documentElement.dir = 'ltr';
          }
          var ogUrl = document.querySelector('meta[property="og:url"]');
          if (ogUrl) ogUrl.setAttribute('content', 'https://academy.bikerz.com' + p);
        } catch (e) { /* defensive — querySelector can't actually throw */ }
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <!-- manifest + SW injected by vite-plugin-pwa at build time -->
    <meta name="theme-color" content="#D4AF37" />

    <!--
      Hero LCP preloads — MUST live in index.html (not in React/Helmet) so the
      browser starts fetching the AVIF on initial HTML parse. When these were
      added by SEOHead, Lighthouse showed a 2,860 ms "resource load delay"
      because the preload tags didn't exist until React mounted.
      Each <link> uses media queries so a phone only fetches the mobile AVIF
      and a desktop only fetches the desktop AVIF — at most one ~25 KB request
      that pays for itself on the home page LCP and adds negligible cost on
      other pages.
    -->
    <link rel="preload" as="image" href="/hero-rider-mobile.avif" type="image/avif" media="(max-width: 768px)" fetchpriority="high" />
    <link rel="preload" as="image" href="/hero-rider.avif" type="image/avif" media="(min-width: 769px)" fetchpriority="high" />


    <!-- Self-hosted Almarai + Roboto: critical weights preloaded (no Google Fonts request chain) -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/almarai-400.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/almarai-700.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/roboto-400.woff2" crossorigin />
    <!-- Preconnect to external origins (early, before any fetches) -->
    <link rel="preconnect" href="https://gifovgwlxwuiibfzyvwb.supabase.co" crossorigin />

    <!-- DNS Prefetch fallbacks (analytics preconnects removed; scripts load from ProductionThirdPartyTrackers for non-staff) -->
    <link rel="dns-prefetch" href="https://gifovgwlxwuiibfzyvwb.supabase.co" />

    <!-- Critical above-the-fold CSS (inlined for instant FCP before main stylesheet loads) -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      html,body{margin:0;padding:0;background:#1c1d1d;color:#cbc4b1;font-family:'Roboto','Almarai',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
      html[dir="rtl"] body{font-family:'Almarai','Roboto',system-ui,sans-serif}
      #root{min-height:100vh;background:#1c1d1d}
      img,svg,video{display:block;max-width:100%;height:auto}
      :root{--navbar-h:64px}
      header,nav[role="navigation"]{min-height:64px}
      
      [hidden]{display:none!important}
    </style>

    <!-- Website Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BIKERZ Academy",
      "url": "https://academy.bikerz.com",
      "description": "Your premier online motorcycle riding school. Learn from certified instructors and master the art of motorcycle riding.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://academy.bikerz.com/courses?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BIKERZ Academy",
      "url": "https://academy.bikerz.com",
      "logo": "https://academy.bikerz.com/favicon.png?v=2",
      "sameAs": [
        "https://twitter.com/BIKERZ"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "url": "https://academy.bikerz.com/contact"
      }
    }
    </script>

    <!-- GA4, Clarity, Meta, TikTok, GHL: see ProductionThirdPartyTrackers (skipped for staff with canAccessAdmin) -->
  </head>

  <body>
    <!-- If Lighthouse shows /~flock.js: it is not referenced in this repo; likely Lovable/hosting tooling. Audit host dashboard before blocking. -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
